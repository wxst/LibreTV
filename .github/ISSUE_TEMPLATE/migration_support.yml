name: Upstream migration support
description: Ask for help migrating from archived LibreSpark/LibreTV
title: "[Migration] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for migration questions from archived LibreSpark/LibreTV. Do not include passwords, tokens, private API sources, cookies, or public instance URLs.
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I read MIGRATION.md first.
          required: true
        - label: I removed all sensitive information from logs and screenshots.
          required: true
        - label: This is about self-hosting my own instance, not a public streaming service.
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: Deployment platform
      options:
        - Cloudflare Pages
        - Vercel
        - Netlify
        - Docker
        - Local Node.js
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Paste the value from /VERSION.txt or package.json.
      placeholder: "202605112342"
    validations:
      required: false
  - type: dropdown
    id: topic
    attributes:
      label: Migration topic
      options:
        - No sources / search failure
        - Playback keeps loading
        - Cloudflare Pages deployment
        - Password or proxy authorization
        - PWA / install
        - Config import/export
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe what you tried, what happened, and what you expected.
    validations:
      required: true
