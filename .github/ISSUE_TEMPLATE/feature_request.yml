name: Feature request
description: Propose a feature aligned with the maintenance roadmap
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find the same request.
          required: true
        - label: I checked the maintenance roadmap in ROADMAP.md.
          required: true
        - label: This request does not require storing, uploading, redistributing, or caching video content.
          required: true
  - type: dropdown
    id: roadmap
    attributes:
      label: 维护路线图 area
      options:
        - Source reliability
        - Playback reliability
        - Public self-hosting experience
        - Diagnostics
        - PWA / install experience
        - Architecture cleanup
        - Documentation / maintenance
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Mention compatibility, deployment, legal, or maintenance risks if known.
    validations:
      required: false
