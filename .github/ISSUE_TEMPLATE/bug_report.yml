name: Bug report
description: Report a reproducible LibreTV problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include passwords, tokens, cookies, private headers, or full proxy auth URLs.
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find the same problem.
          required: true
        - label: I am using the latest code from this repository.
          required: true
        - label: I removed all sensitive information from logs and screenshots.
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: 部署平台
      description: Where does this happen?
      options:
        - Cloudflare Pages
        - Vercel
        - Netlify
        - Docker
        - Local Node.js
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Paste the value from /VERSION.txt or the footer.
      placeholder: "202605112026"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 125 on Windows 11"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - Detail page
        - Playback
        - Proxy
        - PWA / install
        - Deployment
        - Source configuration
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide exact steps. Include source name and video title when relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console / network logs
      description: Include useful logs or status codes. Remove secrets before posting.
      render: text
    validations:
      required: false
