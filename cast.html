<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="same-origin">
    <meta name="theme-color" content="#05070b">
    <title>LibreTV 投屏</title>
    <link rel="icon" href="image/logo.png">
    <script src="libs/hls.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #05070b;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        .cast-shell {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05070b;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
        }

        .cast-status {
            position: fixed;
            left: 24px;
            right: 24px;
            bottom: 24px;
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(8, 13, 22, 0.78);
            color: #cbd5e1;
            font-size: 16px;
            line-height: 1.5;
            backdrop-filter: blur(12px);
        }

        .cast-title {
            position: fixed;
            left: 24px;
            top: 20px;
            max-width: calc(100vw - 48px);
            color: rgba(248, 250, 252, 0.86);
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <main class="cast-shell">
        <video id="castVideo" controls autoplay playsinline></video>
        <div id="castTitle" class="cast-title">LibreTV 投屏</div>
        <div id="castStatus" class="cast-status">正在准备投屏播放...</div>
    </main>
    <script src="js/cast-receiver.js"></script>
</body>
</html>
